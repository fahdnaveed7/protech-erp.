<body>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Initialize Supabase
    const supabase = window.supabase.createClient(
      'https://inkephezabwcdlvnooaa.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlua2VwaGV6YWJ3Y2Rsdm5vb2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MjQ5MzIsImV4cCI6MjA5MDUwMDkzMn0.I4H3mGOkLrm6vowkEbnHIlH6KjQBU5X6ZK0AhErTeHA'
    );

    // PIN authentication
    const AUTH_PINS = {
      '0000': 'manager',
      '1111': 'receiving',
      '2222': 'peeling',
      '3333': 'production',
      '4444': 'qc'
    };

    function PINLogin({ onLogin }) {
      const [pin, setPin] = useState('');
      const [error, setError] = useState('');

      const handlePinChange = (e) => {
        const value = e.target.value.replace(/\D/g, '').slice(0, 4);
        setPin(value);
        setError('');
        
        if (value.length === 4) {
          const role = AUTH_PINS[value];
          if (role) {
            setTimeout(() => onLogin(role), 100);
          } else {
            setError('Invalid PIN');
            setTimeout(() => setPin(''), 500);
          }
        }
      };

      const handleNumPad = (num) => {
        if (pin.length < 4) {
          const newPin = pin + num;
          setPin(newPin);
          setError('');
          
          if (newPin.length === 4) {
            const role = AUTH_PINS[newPin];
            if (role) {
              setTimeout(() => onLogin(role), 100);
            } else {
              setError('Invalid PIN');
              setTimeout(() => setPin(''), 500);
            }
          }
        }
      };

      const handleClear = () => {
        setPin('');
        setError('');
      };

      return (
        <div className="pin-screen">
          <div className="pin-card">
            <h2>Protech Tracker</h2>
            <p>Enter your 4-digit PIN</p>
            <input
              type="password"
              inputMode="numeric"
              maxLength="4"
              value={pin}
              onChange={handlePinChange}
              className="pin-input"
              autoFocus
              placeholder="••••"
            />
            {error && <div className="alert alert-error">{error}</div>}
            <div className="pin-pad">
              {[1,2,3,4,5,6,7,8,9].map(num => (
                <button key={num} className="pin-btn" onClick={() => handleNumPad(num.toString())}>
                  {num}
                </button>
              ))}
              <button className="pin-btn" onClick={handleClear}>✕</button>
              <button className="pin-btn" onClick={() => handleNumPad('0')}>0</button>
              <button className="pin-btn" onClick={() => setPin(pin.slice(0, -1))}>⌫</button>
            </div>
          </div>
        </div>
      );
    }

    // RM Receiving Component
    function RMReceiving() {
      const [formData, setFormData] = useState({
        plateNumber: '',
        species: '',
        arrivalDate: new Date().toISOString().split('T')[0]
      });
      const [grades, setGrades] = useState([]);
      const [myLots, setMyLots] = useState([]);
      const [loading, setLoading] = useState(false);
      const [message, setMessage] = useState({ type: '', text: '' });

      useEffect(() => {
        loadMyLots();
      }, []);

      const loadMyLots = async () => {
        const { data, error } = await supabase
          .from('lots')
          .select('*')
          .order('created_at', { ascending: false })
          .limit(20);
        
        if (!error && data) {
          setMyLots(data);
        }
      };

      const addGrade = () => {
        setGrades([...grades, { grade: '', count: '', boxes: '' }]);
      };

      const removeGrade = (index) => {
        setGrades(grades.filter((_, i) => i !== index));
      };

      const updateGrade = (index, field, value) => {
        const updated = [...grades];
        updated[index][field] = value;
        setGrades(updated);
      };

      const generateLotNumber = async () => {
        const year = new Date().getFullYear().toString().slice(-2);
        
        const { data, error } = await supabase
          .from('lots')
          .select('lot_number')
          .like('lot_number', `%/${year}`)
          .order('created_at', { ascending: false })
          .limit(1);

        if (error) {
          console.error('Error fetching last lot:', error);
          return `1/${year}`;
        }

        if (data && data.length > 0) {
          const lastLot = data[0].lot_number;
          const lastNum = parseInt(lastLot.split('/')[0]);
          return `${lastNum + 1}/${year}`;
        }

        return `1/${year}`;
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        
        if (grades.length === 0) {
          setMessage({ type: 'error', text: 'Please add at least one grade' });
          return;
        }

        setLoading(true);
        setMessage({ type: '', text: '' });

        try {
          const lotNumber = await generateLotNumber();
          const totalBoxes = grades.reduce((sum, g) => sum + (parseInt(g.boxes) || 0), 0);

          const { data: lotData, error: lotError } = await supabase
            .from('lots')
            .insert({
              lot_number: lotNumber,
              plate_number: formData.plateNumber,
              species: formData.species,
              arrival_date: formData.arrivalDate,
              total_boxes: totalBoxes,
              arrival_timestamp: new Date().toISOString()
            })
            .select()
            .single();

          if (lotError) throw lotError;

          const gradeInserts = grades.map(g => ({
            lot_number: lotNumber,
            grade: g.grade,
            count: g.count,
            boxes: parseInt(g.boxes) || 0
          }));

          const { error: gradeError } = await supabase
            .from('lot_grades')
            .insert(gradeInserts);

          if (gradeError) throw gradeError;

          setMessage({ type: 'success', text: `Lot ${lotNumber} created successfully` });
          setFormData({ plateNumber: '', species: '', arrivalDate: new Date().toISOString().split('T')[0] });
          setGrades([]);
          loadMyLots();
        } catch (error) {
          setMessage({ type: 'error', text: error.message });
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="content">
          <div className="card">
            <h3>Log Truck Arrival</h3>
            {message.text && (
              <div className={`alert alert-${message.type}`}>{message.text}</div>
            )}
            <form onSubmit={handleSubmit}>
              <div className="form-group">
                <label>Truck Plate Number</label>
                <input
                  type="text"
                  value={formData.plateNumber}
                  onChange={(e) => setFormData({...formData, plateNumber: e.target.value})}
                  required
                />
              </div>
              <div className="form-group">
                <label>Species</label>
                <input
                  type="text"
                  value={formData.species}
                  onChange={(e) => setFormData({...formData, species: e.target.value})}
                  placeholder="e.g., HLSO, PDTO"
                  required
                />
              </div>
              <div className="form-group">
                <label>Arrival Date</label>
                <input
                  type="date"
                  value={formData.arrivalDate}
                  onChange={(e) => setFormData({...formData, arrivalDate: e.target.value})}
                  required
                />
              </div>

              <h4 style={{marginTop: '24px', marginBottom: '12px', fontSize: '14px', fontWeight: '600'}}>
                Grade Breakdown
              </h4>
              {grades.map((grade, index) => (
                <div key={index} className="grade-row">
                  <div className="grade-row-header">
                    <h4>Grade {index + 1}</h4>
                    <button type="button" onClick={() => removeGrade(index)}>Remove</button>
                  </div>
                  <div className="grade-grid">
                    <div className="form-group" style={{marginBottom: 0}}>
                      <label style={{fontSize: '11px'}}>Grade</label>
                      <input
                        type="text"
                        value={grade.grade}
                        onChange={(e) => updateGrade(index, 'grade', e.target.value)}
                        placeholder="A/B/C"
                        required
                      />
                    </div>
                    <div className="form-group" style={{marginBottom: 0}}>
                      <label style={{fontSize: '11px'}}>Count</label>
                      <input
                        type="text"
                        value={grade.count}
                        onChange={(e) => updateGrade(index, 'count', e.target.value)}
                        placeholder="40/50"
                        required
                      />
                    </div>
                    <div className="form-group" style={{marginBottom: 0}}>
                      <label style={{fontSize: '11px'}}>Boxes</label>
                      <input
                        type="number"
                        value={grade.boxes}
                        onChange={(e) => updateGrade(index, 'boxes', e.target.value)}
                        required
                      />
                    </div>
                  </div>
                </div>
              ))}

              <button type="button" className="btn btn-secondary" onClick={addGrade}>
                + Add Grade
              </button>

              {grades.length > 0 && (
                <div style={{marginTop: '12px', padding: '12px', background: '#f1f5f9', borderRadius: '8px', fontSize: '14px', fontWeight: '600'}}>
                  Total Boxes: {grades.reduce((sum, g) => sum + (parseInt(g.boxes) || 0), 0)}
                </div>
              )}

              <button type="submit" className="btn" disabled={loading}>
                {loading ? 'Submitting...' : 'Submit Lot'}
              </button>
            </form>
          </div>

          <div className="card">
            <h3>Recent Lots</h3>
            {myLots.length === 0 ? (
              <div className="empty-state">No lots submitted yet</div>
            ) : (
              myLots.map(lot => (
                <div key={lot.id} className="list-item">
                  <div className="list-item-header">
                    <div className="list-item-title">{lot.lot_number}</div>
                    <div className="list-item-badge">{lot.total_boxes} boxes</div>
                  </div>
                  <div className="list-item-meta">{lot.species} - {lot.plate_number}</div>
                  <div className="list-item-meta">{new Date(lot.arrival_date).toLocaleDateString()}</div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // Peeling Component
    function Peeling() {
      const [lots, setLots] = useState([]);
      const [selectedLot, setSelectedLot] = useState('');
      const [formData, setFormData] = useState({
        shedName: '',
        inputKg: '',
        outputSpecies: '',
        outputGrade: '',
        outputCount: '',
        outputQtyKg: '',
        yieldPercent: '',
        boxesOut: ''
      });
      const [history, setHistory] = useState([]);
      const [loading, setLoading] = useState(false);
      const [message, setMessage] = useState({ type: '', text: '' });

      useEffect(() => {
        loadLots();
        loadHistory();
      }, []);

      const loadLots = async () => {
        const { data, error } = await supabase
          .from('lots')
          .select('*')
          .order('created_at', { ascending: false });
        
        if (!error && data) {
          setLots(data);
        }
      };

      const loadHistory = async () => {
        const { data, error } = await supabase
          .from('peeling_output')
          .select('*')
          .order('created_at', { ascending: false })
          .limit(20);
        
        if (!error && data) {
          setHistory(data);
        }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setMessage({ type: '', text: '' });

        try {
          const { error } = await supabase
            .from('peeling_output')
            .insert({

            outputSpecies: '',

            outputQtyKg: '',

          setLoading(false);

    // QC Component
    function QC() {
      const [activeTab, setActiveTab] = useState('block');
      const [lots, setLots] = useState([]);
      const [qcLogs, setQcLogs] = useState([]);
      const [message, setMessage] = useState({ type: '', text: '' });
      const [loading, setLoading] = useState(false);

      const [form, setForm] = useState({
        lot: '',
        logType: 'block_setting',
        product: '',
        count: '',
        actualCount: '',
        weight: '',
        temperature: '',
        photo: null,
        buyer: '',
        glazePercent: '',
        fillingWeight: '',
        cases: '',
        packets: ''
      });

      useEffect(() => {
        loadLots();
        loadQCLogs();
      }, []);

      const loadLots = async () => {
        const { data } = await supabase.from('lots').select('*').order('created_at', { ascending: false });
        if (data) setLots(data);
      };

      const loadQCLogs = async () => {
        const { data } = await supabase.from('qc_logs').select('*').order('timestamp', { ascending: false });
        if (data) setQcLogs(data);
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
          let photoUrl = null;
          if (form.photo) {
            const fileExt = form.photo.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExt}`;
            const { data: uploadData, error: uploadError } = await supabase.storage
              .from('protech-photos')
              .upload(fileName, form.photo);
            if (uploadError) throw uploadError;
            photoUrl = `https://inkephezabwcdlvnooaa.supabase.co/storage/v1/object/public/protech-photos/${fileName}`;
          }

          const payload = {
            lot_number: form.lot,
            log_type: form.logType,
            timestamp: new Date().toISOString(),
            photo_url: photoUrl
          };

          if (form.logType === 'block_setting') {
            payload.product = form.product;
            payload.count = form.count;
            payload.actual_count = form.actualCount;
            payload.weight = parseFloat(form.weight);
          } else if (form.logType.includes('core_temp')) {
            payload.temperature = parseFloat(form.temperature);
          } else if (form.logType === 'repacking_specs') {
            payload.buyer = form.buyer;
            payload.glaze_percent = parseFloat(form.glazePercent);
            payload.filling_weight = parseFloat(form.fillingWeight);
          } else if (form.logType === 'rider_insertion') {
            payload.buyer = form.buyer;
            payload.product = form.product;
            payload.count = form.count;
          } else if (form.logType === 'temp_before_stuffing') {
            payload.temperature = parseFloat(form.temperature);
          } else if (form.logType === 'final_output') {
            payload.buyer = form.buyer;
            payload.cases = parseInt(form.cases);
            payload.packets = parseInt(form.packets);
          }

          const { error } = await supabase.from('qc_logs').insert(payload);
          if (error) throw error;

          setMessage({ type: 'success', text: 'QC log submitted' });
          setForm({
            lot: form.lot,
            logType: 'block_setting',
            product: '',
            count: '',
            actualCount: '',
            weight: '',
            temperature: '',
            photo: null,
            buyer: '',
            glazePercent: '',
            fillingWeight: '',
            cases: '',
            packets: ''
          });
          loadQCLogs();
        } catch (error) {
          setMessage({ type: 'error', text: error.message });
        } finally {
          setLoading(false);
        }
      };

      return (
        <div>
          <div className="tabs">
            <button className={`tab ${activeTab === 'block' ? 'active' : ''}`} onClick={() => setActiveTab('block')}>Block</button>
            <button className={`tab ${activeTab === 'temp' ? 'active' : ''}`} onClick={() => setActiveTab('temp')}>Temp</button>
            <button className={`tab ${activeTab === 'repack' ? 'active' : ''}`} onClick={() => setActiveTab('repack')}>Repack</button>
            <button className={`tab ${activeTab === 'output' ? 'active' : ''}`} onClick={() => setActiveTab('output')}>Output</button>
            <button className={`tab ${activeTab === 'history' ? 'active' : ''}`} onClick={() => setActiveTab('history')}>History</button>
          </div>

          <div className="content">
            {message.text && <div className={`alert alert-${message.type}`}>{message.text}</div>}

            {activeTab === 'block' && (
              <div className="card">
                <h3>Block Setting</h3>
                <form onSubmit={handleSubmit}>
                  <input type="hidden" value={form.logType = 'block_setting'} />
                  <div className="form-group">
                    <label>Lot</label>
                    <select value={form.lot} onChange={(e) => setForm({...form, lot: e.target.value})} required>
                      <option value="">Select lot...</option>
                      {lots.map(lot => <option key={lot.id} value={lot.lot_number}>{lot.lot_number}</option>)}
                    </select>
                  </div>
                  <div className="form-group">
                    <label>Product</label>
                    <input type="text" value={form.product} onChange={(e) => setForm({...form, product: e.target.value})} required />
                  </div>
                  <div className="form-group">
                    <label>Count</label>
                    <input type="text" value={form.count} onChange={(e) => setForm({...form, count: e.target.value})} required />
                  </div>
                  <div className="form-group">
                    <label>Actual Count</label>
                    <input type="text" value={form.actualCount} onChange={(e) => setForm({...form, actualCount: e.target.value})} required />
                  </div>
                  <div className="form-group">
                    <label>Weight (kg)</label>
                    <input type="number" step="0.01" value={form.weight} onChange={(e) => setForm({...form, weight: e.target.value})} required />
                  </div>
                  <button type="submit" className="btn" disabled={loading}>Submit</button>
                </form>
              </div>
            )}

            {activeTab === 'temp' && (
              <div className="card">
                <h3>Core Temperature</h3>
                <form onSubmit={handleSubmit}>
                  <div className="form-group">
                    <label>Lot</label>
                    <select value={form.lot} onChange={(e) => setForm({...form, lot: e.target.value})} required>
                      <option value="">Select lot...</option>
                      {lots.map(lot => <option key={lot.id} value={lot.lot_number}>{lot.lot_number}</option>)}
                    </select>
                  </div>
                  <div className="form-group">
                    <label>Type</label>
                    <select value={form.logType} onChange={(e) => setForm({...form, logType: e.target.value})} required>
                      <option value="core_temp_before_depanning">Before Depanning</option>
                      <option value="core_temp_after_depanning">After Depanning</option>
                      <option value="temp_before_stuffing">Before Container Stuffing</option>
                    </select>
                  </div>
                  <div className="form-group">
                    <label>Temperature (°C)</label>
                    <input type="number" step="0.1" value={form.temperature} onChange={(e) => setForm({...form, temperature: e.target.value})} required />
                  </div>
                  <div className="form-group">
                    <label>Photo</label>
                    <input type="file" accept="image/*" onChange={(e) => setForm({...form, photo: e.target.files[0]})} />
                  </div>
                  <button type="submit" className="btn" disabled={loading}>Submit</button>
                </form>
              </div>
            )}

            {activeTab === 'repack' && (
              <div className="card">
                <h3>Repacking & Rider</h3>
                <form onSubmit={handleSubmit}>
                  <div className="form-group">
                    <label>Lot</label>
                    <select value={form.lot} onChange={(e) => setForm({...form, lot: e.target.value})} required>
                      <option value="">Select lot...</option>
                      {lots.map(lot => <option key={lot.id} value={lot.lot_number}>{lot.lot_number}</option>)}
                    </select>
                  </div>
                  <div className="form-group">
                    <label>Type</label>
                    <select value={form.logType} onChange={(e) => setForm({...form, logType: e.target.value})} required>
                      <option value="repacking_specs">Repacking Specs</option>
                      <option value="rider_insertion">Rider Insertion</option>
                    </select>
                  </div>
                  <div className="form-group">
                    <label>Buyer</label>
                    <input type="text" value={form.buyer} onChange={(e) => setForm({...form, buyer: e.target.value})} required />
                  </div>
                  {form.logType === 'repacking_specs' && (
                    <>
                      <div className="form-group">
                        <label>Glaze %</label>
                        <input type="number" step="0.1" value={form.glazePercent} onChange={(e) => setForm({...form, glazePercent: e.target.value})} required />
                      </div>
                      <div className="form-group">
                        <label>Filling Weight (kg)</label>
                        <input type="number" step="0.01" value={form.fillingWeight} onChange={(e) => setForm({...form, fillingWeight: e.target.value})} required />
                      </div>
                    </>
                  )}
                  {form.logType === 'rider_insertion' && (
                    <>
                      <div className="form-group">
                        <label>Product</label>
                        <input type="text" value={form.product} onChange={(e) => setForm({...form, product: e.target.value})} required />
                      </div>
                      <div className="form-group">
                        <label>Count</label>
                        <input type="text" value={form.count} onChange={(e) => setForm({...form, count: e.target.value})} required />
                      </div>
                    </>
                  )}
                  <button type="submit" className="btn" disabled={loading}>Submit</button>
                </form>
              </div>
            )}

            {activeTab === 'output' && (
              <div className="card">
                <h3>Final Output</h3>
                <form onSubmit={handleSubmit}>
                  <input type="hidden" value={form.logType = 'final_output'} />
                  <div className="form-group">
                    <label>Lot</label>
                    <select value={form.lot} onChange={(e) => setForm({...form, lot: e.target.value})} required>
                      <option value="">Select lot...</option>
                      {lots.map(lot => <option key={lot.id} value={lot.lot_number}>{lot.lot_number}</option>)}
                    </select>
                  </div>
                  <div className="form-group">
                    <label>Buyer</label>
                    <input type="text" value={form.buyer} onChange={(e) => setForm({...form, buyer: e.target.value})} required />
                  </div>
                  <div className="form-group">
                    <label>Cases</label>
                    <input type="number" value={form.cases} onChange={(e) => setForm({...form, cases: e.target.value})} required />
                  </div>
                  <div className="form-group">
                    <label>Packets</label>
                    <input type="number" value={form.packets} onChange={(e) => setForm({...form, packets: e.target.value})} required />
                  </div>
                  <button type="submit" className="btn" disabled={loading}>Submit</button>
                </form>
              </div>
            )}

            {activeTab === 'history' && (
              <div className="card">
                <h3>QC History</h3>
                {qcLogs.map(log => (
                  <div key={log.id} className="list-item">
                    <div className="list-item-title">{log.log_type.replace(/_/g, ' ').toUpperCase()}</div>
                    <div className="list-item-meta">{log.lot_number}</div>
                    <div className="list-item-meta">{new Date(log.timestamp).toLocaleString()}</div>
                    {log.temperature && <div className="list-item-meta">Temp: {log.temperature}°C</div>}
                    {log.product && <div className="list-item-meta">{log.product} - {log.count}</div>}
                    {log.buyer && <div className="list-item-meta">Buyer: {log.buyer}</div>}
                    {log.photo_url && <img src={log.photo_url} className="photo-preview" alt="QC" />}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // Manager Dashboard Component
    function Manager() {
      const [lots, setLots] = useState([]);
      const [selectedLot, setSelectedLot] = useState(null);
      const [lotDetails, setLotDetails] = useState({
        grades: [],
        peeling: [],
        plans: [],
        machineEvents: [],
        tempLogs: [],
        packing: [],
        qcLogs: []
      });
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        loadLots();
      }, []);

      const loadLots = async () => {
        const { data } = await supabase.from('lots').select('*').order('created_at', { ascending: false });
        if (data) setLots(data);
      };

      const loadLotDetails = async (lotNumber) => {
        setLoading(true);
        try {
          const [grades, peeling, plans, machineEvents, tempLogs, packing, qcLogs] = await Promise.all([
            supabase.from('lot_grades').select('*').eq('lot_number', lotNumber),
            supabase.from('peeling_output').select('*').eq('lot_number', lotNumber),
            supabase.from('production_plans').select('*').eq('lot_number', lotNumber),
            supabase.from('machine_events').select('*').eq('lot_number', lotNumber).order('timestamp', { ascending: true }),
            supabase.from('temp_logs').select('*').eq('lot_number', lotNumber).order('timestamp', { ascending: false }),
            supabase.from('packing_status').select('*').eq('lot_number', lotNumber),
            supabase.from('qc_logs').select('*').eq('lot_number', lotNumber).order('timestamp', { ascending: false })
          ]);

          setLotDetails({
            grades: grades.data || [],
            peeling: peeling.data || [],
            plans: plans.data || [],
            machineEvents: machineEvents.data || [],
            tempLogs: tempLogs.data || [],
            packing: packing.data || [],
            qcLogs: qcLogs.data || []
          });
        } catch (error) {
          console.error('Error loading lot details:', error);
        } finally {
          setLoading(false);
        }
      };

      const selectLot = (lot) => {
        setSelectedLot(lot);
        loadLotDetails(lot.lot_number);
      };

      if (selectedLot) {
        return (
          <div className="content">
            <button className="btn btn-secondary" onClick={() => setSelectedLot(null)}>← Back to Lots</button>
            
            <div className="card" style={{marginTop: '16px'}}>
              <h3>Lot {selectedLot.lot_number}</h3>
              <div className="stats-grid">
                <div className="stat-card">
                  <div className="stat-label">Species</div>
                  <div className="stat-value" style={{fontSize: '16px'}}>{selectedLot.species}</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Total Boxes</div>
                  <div className="stat-value">{selectedLot.total_boxes}</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Plate Number</div>
                  <div className="stat-value" style={{fontSize: '14px'}}>{selectedLot.plate_number}</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Arrival Date</div>
                  <div className="stat-value" style={{fontSize: '14px'}}>{new Date(selectedLot.arrival_date).toLocaleDateString()}</div>
                </div>
              </div>
            </div>

            {loading && <div className="loading">Loading lot details...</div>}

            {lotDetails.grades.length > 0 && (
              <div className="card">
                <h3>Grade Breakdown</h3>
                {lotDetails.grades.map((g, i) => (
                  <div key={i} className="list-item">
                    <div className="list-item-title">{g.grade} - {g.count}</div>
                    <div className="list-item-meta">{g.boxes} boxes</div>
                  </div>
                ))}
              </div>
            )}

            {lotDetails.peeling.length > 0 && (
              <div className="card">
                <h3>Peeling Records</h3>
                {lotDetails.peeling.map((p, i) => (
                  <div key={i} className="list-item">
                    <div className="list-item-header">
                      <div className="list-item-title">{p.shed_name}</div>
                      <div className="list-item-badge">{p.yield_percent}%</div>
                    </div>
                    <div className="list-item-meta">{p.output_species} {p.output_grade} {p.output_count}</div>
                    <div className="list-item-meta">{p.input_kg}kg → {p.output_qty_kg}kg ({p.boxes_out} boxes)</div>
                  </div>
                ))}
              </div>
            )}

            {lotDetails.plans.length > 0 && (
              <div className="card">
                <h3>Production Plans</h3>
                {lotDetails.plans.map((p, i) => (
                  <div key={i} className="list-item">
                    <div className="list-item-title">{p.buyer} - {p.target_count}</div>
                    <div className="list-item-meta">Target: {p.target_kg}kg</div>
                    <div className="list-item-meta">{p.remarks}</div>
                  </div>
                ))}
              </div>
            )}

            {lotDetails.machineEvents.length > 0 && (
              <div className="card">
                <h3>Machine Timeline</h3>
                <div className="timeline">
                  {lotDetails.machineEvents.map((e, i) => (
                    <div key={i} className="timeline-item">
                      <div className="timeline-header">{e.machine_type} - {e.event_type}</div>
                      <div className="timeline-meta">{new Date(e.timestamp).toLocaleString()}</div>
                      {e.load_number && <div className="timeline-body">Load {e.load_number}</div>}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {lotDetails.tempLogs.length > 0 && (
              <div className="card">
                <h3>Temperature Logs</h3>
                {lotDetails.tempLogs.map((t, i) => (
                  <div key={i} className="list-item">
                    <div className="list-item-title">{t.temp_type}</div>
                    <div className="list-item-meta">{t.temperature}°C</div>
                    <div className="list-item-meta">{new Date(t.timestamp).toLocaleString()}</div>
                    {t.photo_url && <img src={t.photo_url} className="photo-preview" alt="Temp" />}
                  </div>
                ))}
              </div>
            )}

            {lotDetails.packing.length > 0 && (
              <div className="card">
                <h3>Packing Progress</h3>
                {lotDetails.packing.map((p, i) => (
                  <div key={i} className="list-item">
                    <div className="list-item-title">{p.buyer} - {p.count_size}</div>
                    <div className="list-item-meta">Packed: {p.cases_packed} | Balance: {p.balance}kg</div>
                  </div>
                ))}
              </div>
            )}

            {lotDetails.qcLogs.length > 0 && (
              <div className="card">
                <h3>QC Logs</h3>
                {lotDetails.qcLogs.map((q, i) => (
                  <div key={i} className="list-item">
                    <div className="list-item-title">{q.log_type.replace(/_/g, ' ').toUpperCase()}</div>
                    <div className="list-item-meta">{new Date(q.timestamp).toLocaleString()}</div>
                    {q.temperature && <div className="list-item-meta">Temp: {q.temperature}°C</div>}
                    {q.product && <div className="list-item-meta">{q.product} - {q.count}</div>}
                    {q.buyer && <div className="list-item-meta">Buyer: {q.buyer}</div>}
                    {q.photo_url && <img src={q.photo_url} className="photo-preview" alt="QC" />}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      return (
        <div className="content">
          <div className="card">
            <h3>All Lots</h3>
            {lots.length === 0 ? (
              <div className="empty-state">No lots available</div>
            ) : (
              lots.map(lot => (
                <div key={lot.id} className="list-item" onClick={() => selectLot(lot)}>
                  <div className="list-item-header">
                    <div className="list-item-title">{lot.lot_number}</div>
                    <div className="list-item-badge">{lot.total_boxes} boxes</div>
                  </div>
                  <div className="list-item-meta">{lot.species} - {lot.plate_number}</div>
                  <div className="list-item-meta">{new Date(lot.arrival_date).toLocaleDateString()}</div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // Main App Component
    function App() {
      const [role, setRole] = useState(null);

      const handleLogin = (userRole) => {
        setRole(userRole);
      };

      const handleLogout = () => {
        setRole(null);
      };

      if (!role) {
        return <PINLogin onLogin={handleLogin} />;
      }

      return (
        <div>
          <div className="header">
            <div className="container">
              <h1>Protech Tracker</h1>
              <div className="subtitle">{role.toUpperCase()}</div>
              <button className="logout-btn" onClick={handleLogout}>Logout</button>
            </div>
          </div>
          <div className="container">
            {role === 'receiving' && <RMReceiving />}
            {role === 'peeling' && <Peeling />}
            {role === 'production' && <Production />}
            {role === 'qc' && <QC />}
            {role === 'manager' && <Manager />}
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
